    <script>
      // 兼容 Hash 路由：直接访问 /admin/... 等路径时自动跳转到 #/admin/...
      const pathname = window.location.pathname
      const hash = window.location.hash
      if (!hash && pathname !== '/' && pathname !== '/index.html') {
        window.location.replace(`${window.location.origin}/#${pathname}${window.location.search}`)
      }
    </script>
